<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Philadelphia Chikalimba — Login</title>
  <link rel="stylesheet" href="auth.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="auth-bg">
    <div class="auth-grid"></div>
    <div class="auth-orb"></div>
  </div>

  <main class="auth-container">
    <div class="auth-brand">
      <span class="brand-mark">PC</span>
      <span class="brand-name">Philadelphia Chikalimba</span>
    </div>

    <div class="auth-card">
      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Sign in to access your dashboard</p>
      </div>

      <div id="auth-error" class="auth-error hidden"></div>

      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Sign In</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="login-form" class="auth-form active">
        <div class="field-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="your@email.com" required />
        </div>
        <div class="field-group">
          <label for="login-password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="login-password" placeholder="••••••••" required />
            <button type="button" class="pw-toggle" aria-label="Toggle password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="login-btn">
          <span>Sign In</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        <button type="button" class="btn-ghost" id="google-btn">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form id="register-form" class="auth-form">
        <div class="field-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" placeholder="Philadelphia Chikalimba" required />
        </div>
        <div class="field-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="your@email.com" required />
        </div>
        <div class="field-group">
          <label for="reg-password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="reg-password" placeholder="••••••••" required />
            <button type="button" class="pw-toggle" aria-label="Toggle password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="reg-btn">
          <span>Create Account</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>
    </div>

    <p class="auth-footer">← <a href="https://philly619.github.io/Philadelphia-dev/">Back to Portfolio</a></p>
  </main>

  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
