<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PC — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
<script src="auth.js" defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a09;
    --bg2: #111110;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0ede6;
    --muted: rgba(240,237,230,0.45);
    --accent: #c9b99a;
    --accent2: #8a7a62;
    --red: #e06b6b;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    overflow: hidden;
  }

  /* Subtle grid background matching portfolio's geometric feel */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative; z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  /* Monogram — mirrors portfolio's "PC" brand mark */
  .monogram {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .monogram::before,
  .monogram::after {
    content: '';
    width: 32px; height: 1px;
    background: var(--accent2);
  }

  .card {
    width: 100%;
    max-width: 420px;
    border: 1px solid var(--border);
    background: var(--bg2);
    padding: 2.5rem 2.5rem 2rem;
    position: relative;
  }

  /* Corner marks — portfolio uses decorative glyphs */
  .card::before {
    content: '◎';
    position: absolute;
    top: -0.6rem; left: 1.5rem;
    font-size: 0.7rem;
    color: var(--accent);
    background: var(--bg2);
    padding: 0 0.4rem;
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.75rem;
    font-weight: 300;
    font-style: italic;
    color: var(--text);
    margin-bottom: 0.35rem;
  }

  .card-sub {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .field {
    margin-bottom: 1.25rem;
  }

  .field label {
    display: block;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .field input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.875rem;
    padding: 0.5rem 0;
    outline: none;
    transition: border-color 0.2s;
    caret-color: var(--accent);
  }
  .field input:focus {
    border-bottom-color: var(--accent);
  }
  .field input::placeholder {
    color: rgba(240,237,230,0.2);
    font-style: italic;
  }

  .error-msg {
    font-size: 0.7rem;
    color: var(--red);
    letter-spacing: 0.05em;
    margin-bottom: 1.25rem;
    display: none;
  }
  .error-msg.show { display: block; }

  .btn-login {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border-hover);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 0.85rem 1rem;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    position: relative;
    overflow: hidden;
    margin-top: 0.5rem;
  }
  .btn-login:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }
  .btn-login:active { opacity: 0.85; }
  .btn-login.loading { pointer-events: none; opacity: 0.6; }

  .hint {
    margin-top: 1.5rem;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-align: center;
    border-top: 1px solid var(--border);
    padding-top: 1.25rem;
  }
  .hint span { color: var(--accent); }

  /* Footer branding */
  .footer {
    position: fixed;
    bottom: 1.5rem;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: rgba(240,237,230,0.2);
    text-align: center;
  }

  /* Fade-in on load */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .monogram { animation: fadeUp 0.6s ease both; }
  .card      { animation: fadeUp 0.6s ease 0.15s both; }
  .footer    { animation: fadeUp 0.6s ease 0.3s both; }
</style>
</head>
<body>
<div class="page">
  <div class="monogram">PC</div>

  <div class="card">
    <h1 class="card-title">Welcome back.</h1>
    <p class="card-sub">Secure access — Philadelphia Chikalimba</p>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" autocomplete="username" placeholder="your username" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
    </div>

    <p class="error-msg" id="error-msg">◈ Invalid credentials. Please try again.</p>

    <button class="btn-login" id="login-btn" onclick="handleLogin()">
      Enter ◎
    </button>

    <p class="hint">
      Bridging <span>business strategy</span> &amp; <span>digital innovation</span><br/>
      Commerce &amp; Technology — Malawi College of Accountancy
    </p>
  </div>
</div>

<p class="footer">© 2026 Philadelphia Chikalimba — All rights reserved</p>

</body>
</html>
